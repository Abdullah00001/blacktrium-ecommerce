name: blacktrium-ecommerce

services:
  mongo:
    image: mongo:7.0
    container_name: blacktrium_ecommerce_mongo
    restart: unless-stopped
    entrypoint:
      - bash
      - -lc
      - |
        if [ ! -f /data/configdb/mongo-keyfile ]; then
          umask 077
          head -c 756 /dev/urandom | base64 > /data/configdb/mongo-keyfile
          chown mongodb:mongodb /data/configdb/mongo-keyfile
        fi
        exec docker-entrypoint.sh mongod --replSet rs0 --bind_ip_all --keyFile /data/configdb/mongo-keyfile
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-blacktrium_ecommerce}
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-blacktrium_root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-blacktrium_root_password}
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    expose:
      - "27017"
    ports:
      - "127.0.0.1:27017:27017"
    networks:
      - blacktrium_ecommerce_net

  mongo-init:
    image: mongo:7.0
    container_name: blacktrium_ecommerce_mongo_init
    restart: "no"
    command: |
      bash -c "
        until mongosh --host mongo:27017 --authenticationDatabase admin -u $$MONGO_ROOT_USER -p $$MONGO_ROOT_PASSWORD --eval 'db.runCommand({ ping: 1 })'; do
          sleep 2
        done
        mongosh --host mongo:27017 --authenticationDatabase admin -u $$MONGO_ROOT_USER -p $$MONGO_ROOT_PASSWORD --eval '
          try {
            rs.status();
          } catch (e) {
            rs.initiate({_id: \"rs0\", members: [{_id: 0, host: \"mongo:27017\"}]});
          }
        '
      "
    environment:
      MONGO_ROOT_USER: ${MONGO_ROOT_USER:-blacktrium_root}
      MONGO_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-blacktrium_root_password}
    depends_on:
      mongo:
        condition: service_started
    networks:
      - blacktrium_ecommerce_net

  redis:
    image: redis:7-alpine
    container_name: blacktrium_ecommerce_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-myStrongRedisPassword}
    expose:
      - "6379"
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - blacktrium_ecommerce_net

  server:
    build:
      context: .
      dockerfile: server/Dockerfile.dev
    container_name: blacktrium_ecommerce_server
    restart: unless-stopped
    env_file:
      - ./server/.env
    environment:
      MONGODB_URI: mongodb://${MONGO_ROOT_USER:-blacktrium_root}:${MONGO_ROOT_PASSWORD:-blacktrium_root_password}@mongo:27017/${MONGO_DATABASE:-blacktrium_ecommerce}?authSource=admin&replicaSet=rs0
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-myStrongRedisPassword}
      REDIS_PORT: 6379
    ports:
      - "5000:5000"
    volumes:
      - ./server/src:/usr/src/app/src
      - server_node_modules:/usr/src/app/node_modules
    depends_on:
      mongo-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
    networks:
      - blacktrium_ecommerce_net

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile.dev
    container_name: blacktrium_ecommerce_worker
    restart: unless-stopped
    env_file:
      - ./worker/.env
    environment:
      MONGODB_URI: mongodb://${MONGO_ROOT_USER:-blacktrium_root}:${MONGO_ROOT_PASSWORD:-blacktrium_root_password}@mongo:27017/${MONGO_DATABASE:-blacktrium_ecommerce}?authSource=admin&replicaSet=rs0
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-myStrongRedisPassword}
      REDIS_PORT: 6379
    volumes:
      - ./worker/src:/app/src
      - worker_node_modules:/app/node_modules
    depends_on:
      mongo-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
    networks:
      - blacktrium_ecommerce_net

  corn:
    build:
      context: .
      dockerfile: corn/Dockerfile.dev
    container_name: blacktrium_ecommerce_corn
    restart: unless-stopped
    env_file:
      - ./corn/.env
    environment:
      MONGODB_URI: mongodb://${MONGO_ROOT_USER:-blacktrium_root}:${MONGO_ROOT_PASSWORD:-blacktrium_root_password}@mongo:27017/${MONGO_DATABASE:-blacktrium_ecommerce}?authSource=admin&replicaSet=rs0
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-myStrongRedisPassword}
      REDIS_PORT: 6379
    volumes:
      - ./corn/src:/app/src
      - corn_node_modules:/app/node_modules
    depends_on:
      mongo-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
    networks:
      - blacktrium_ecommerce_net

volumes:
  mongo_data:
  mongo_config:
  redis_data:
  server_node_modules:
  worker_node_modules:
  corn_node_modules:

networks:
  blacktrium_ecommerce_net:
    name: blacktrium_ecommerce_net
